services:
    db:
        image: mysql
        env_file: .env
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    api:
        build: ./backend
        ports:
            - "8000:8000"
        env_file: .env
        environment:
            # Override DATABASE_URL so it points to the 'db' service, not localhost
            DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
        depends_on:
            db:
                condition: service_healthy

    frontend:
        build: ./frontend
        ports:
            - "4173:4173"
        environment:
            VITE_API_URL: http://api:8000
        depends_on:
            - api

    adminer:
        image: adminer
        ports:
            - "8080:8080"
        depends_on:
            - db

volumes:
    mysql_data:
