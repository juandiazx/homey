services:
    db:
        image: mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-homey_root}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-homey}
            MYSQL_USER: ${MYSQL_USER:-homey}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-homey_pass}
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    adminer:
        image: adminer
        ports:
            - "8080:8080"
        depends_on:
            - db

volumes:
    mysql_data:
